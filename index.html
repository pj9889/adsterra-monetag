<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Chat - Active</title>
    <style>
        /* আপনার ল্যান্ডিং পেজের ডিজাইন এবং স্টাইল এখানে থাকবে */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .chat-container { text-align: center; font-size: 20px; color: #333; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Jacklyn Rose</h2>
    <p>Connecting to secure chat server... Please wait.</p>
</div>
<script>
    // বসের দেওয়া ২টি আসল স্মার্ট লিংক
    const ADSTERRA_LINK = "https://www.effectivecpmnetwork.com/p9an5hbr8t?key=59b96418bf25c6ba23c9d389924ff203";
    const MONETAG_LINK = "https://omg10.com/4/10504269";

    let actionTriggered = false;

    // ভিজিটর আপনার ডোমেইনে এসে প্রথম টাচ বা ক্লিক করলেই সিস্টেম চালু হবে
    document.addEventListener("click", function() {
        
        if (!actionTriggered) {
            actionTriggered = true;

            // ১. ০ সেকেন্ডে নতুন আরেকটি ট্যাবে Adsterra ওপেন হবে এবং স্ক্রিন ওটার দিকে চলে যাবে
            var adsterraTab = window.open(ADSTERRA_LINK, "_blank");
            if (adsterraTab) {
                adsterraTab.focus();
            }

            // ২. এবার ব্যাকগ্রাউন্ডে থাকা আপনার ল্যান্ডিং পেজটি গোপনে নজর রাখবে।
            // ১ম ট্যাবে এডস্টেরার রিডাইরেক্ট বা রিলোড প্রসেস শেষ হয়ে ভিজিটর যখনই সেখানে কোনো অ্যাকশন নেবে,
            // তখন পেছনের ল্যান্ডিং পেজটি সাথে সাথে নিজেকে Monetag লিংকে রূপান্তর (রিলোড) করে ফেলবে।
            
            var checkAction = setInterval(function() {
                // ব্রাউজার যখনই দেখবে ইউজার ১ম ট্যাবে ব্যস্ত এবং এই মেইন পেজটি ব্যাকগ্রাউন্ডে স্থির আছে
                window.onblur = function() {
                    // ইউজার ১ম ট্যাবে চলে গেছে
                };
                
                window.onfocus = function() {
                    // ১ম ট্যাবের কাজ শেষ করে ইউজার যখনই এই ট্যাবে ফিরে আসবে বা ১ম ট্যাব কাটবে,
                    // সাথে সাথে এই ল্যান্ডিং পেজটি ২য় স্মার্ট লিংকে কনভার্ট হয়ে যাবে।
                    clearInterval(checkAction);
                    window.location.href = MONETAG_LINK;
                };
            }, 1000);

            // সেফটি ব্যাকআপ ফলব্যাক: যদি ব্রাউজারের কোনো ইস্যুর কারণে ফোকাস ট্র্যাকিং কাজ না-ও করে,
            // তবে সর্বোচ্চ ১০ সেকেন্ড পর ল্যান্ডিং পেজটি অটোমেটিক ২য় লিংকে চলে যাবে যেন আর্নিং মিস না হয়।
            setTimeout(function() {
                window.location.href = MONETAG_LINK;
            }, 10000); 
        }

    }, { once: true });
</script>

</body>
</html>
