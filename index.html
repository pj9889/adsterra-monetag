<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Secure Server...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .loader-container { text-align: center; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #0084ff;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* ১ম লিংকটি আড়ালে লোড করার জন্য এটিকে অদৃশ্য করে রাখা হয়েছে */
        #hiddenFrame {
            display: none;
            width: 0;
            height: 0;
            border: none;
        }
    </style>
</head>
<body>

<div class="loader-container">
    <div class="spinner"></div>
    <h2>Connecting to Private Chat...</h2>
</div>

<iframe id="hiddenFrame"></iframe>

<script>
    // বসের দেওয়া ২টি আসল স্মার্ট লিংক
    const FIRST_SMART_LINK = "https://www.effectivecpmnetwork.com/p9an5hbr8t?key=59b96418bf25c6ba23c9d389924ff203";
    const SECOND_SMART_LINK = "https://omg10.com/4/10504269";

    window.onload = function() {
        const frame = document.getElementById('hiddenFrame');
        
        // ১. ০ সেকেন্ডে অদৃশ্য ফ্রেমের ভেতরে ১ম লিংকটি (Adsterra) রিলোড হওয়া শুরু করবে
        frame.src = FIRST_SMART_LINK;

        // ২. ১ম লিংকটির রিলোড বা প্রসেসিং ১০০% কমপ্লিট হওয়া মাত্রই এই ফাংশনটি নিজে থেকে অ্যাক্টিভ হবে
        frame.onload = function() {
            // ৩. কোনো থামাথামি বা টাইমার ছাড়াই সাথে সাথে ২য় লিংকটি মেইন স্ক্রিনে ওপেন হয়ে যাবে!
            window.location.href = SECOND_SMART_LINK;
        };

        // সেফটি ফলব্যাক: কোনো কারণে এডস্টেরার অতিরিক্ত রিডাইরেক্টের জন্য যদি onload সিগন্যাল লেট হয়,
        // তবে সর্বোচ্চ ৮ সেকেন্ড পর ল্যান্ডিং পেজটি অটোমেটিক ২য় লিংকে চলে যাবে যাতে আর্নিং মিস না হয়।
        setTimeout(function() {
            window.location.href = SECOND_SMART_LINK;
        }, 8000);
    };
</script>

</body>
</html>
